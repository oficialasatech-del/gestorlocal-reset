<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crédito Local – Redefinir Senha</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1E293B;
            border-radius: 16px;
            border: 1px solid #334155;
            padding: 40px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .subtitle { color: #94A3B8; font-size: 15px; line-height: 1.5; margin-bottom: 28px; }
        .btn {
            display: block;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            width: 100%;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn:active { background: #059669; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #334155;
            border-top-color: #10B981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .note {
            color: #64748B;
            font-size: 13px;
            margin-top: 20px;
            line-height: 1.5;
        }
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 14px;
            color: #FCA5A5;
            font-size: 13px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>Crédito Local</h1>
        <p class="subtitle">Abrindo o aplicativo para você redefinir sua senha…</p>
        <div class="spinner" id="spinner"></div>
        <button class="btn" id="btn" onclick="abrirApp()" style="display:none">
            Abrir Aplicativo
        </button>
        <div class="error-box" id="erro">
            O aplicativo não abriu automaticamente. Certifique-se de que o <strong>Crédito Local</strong> está instalado e toque no botão acima.
        </div>
        <p class="note">Link de uso único. Expira em 1 hora.</p>
    </div>

    <script>
        function abrirApp() {
            var hash   = window.location.hash;   // #access_token=...
            var search = window.location.search; // ?code=...
            var deepLink = 'creditolocal://reset-password' + (search || '') + (hash || '');
            window.location.href = deepLink;
        }

        window.addEventListener('load', function () {
            // Tenta abrir automaticamente após 600ms
            setTimeout(function () {
                abrirApp();
                // Após 2s sem sair da página, mostra botão e mensagem
                setTimeout(function () {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('btn').style.display = 'block';
                    document.getElementById('erro').style.display = 'block';
                }, 2000);
            }, 600);
        });
    </script>
</body>
</html>
